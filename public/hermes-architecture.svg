<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="IBM Plex Mono, monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#020617"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- LAPTOP BOUNDARY -->
  <rect x="40" y="40" width="920" height="340" rx="12" fill="rgba(34,211,238,0.03)" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="55" y="62" fill="#22d3ee" font-size="11" font-weight="600">MY LAPTOP — Ubuntu 24.04 · Always On</text>

  <!-- === Hermes Agent (center, main) === -->
  <rect x="375" y="90" width="250" height="90" rx="8" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <rect x="375" y="90" width="250" height="90" rx="8" fill="rgba(6,78,59,0.15)"/>
  <text x="500" y="117" fill="white" font-size="14" font-weight="700" text-anchor="middle">Hermes Agent</text>
  <text x="500" y="137" fill="#94a3b8" font-size="10" text-anchor="middle">Node.js · LLM-powered</text>
  <text x="500" y="155" fill="#34d399" font-size="9" text-anchor="middle">Skills · Cron · Sub-agents</text>

  <!-- === Tailscale (left of Hermes) === -->
  <rect x="120" y="200" width="160" height="65" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="120" y="200" width="160" height="65" rx="6" fill="rgba(251,191,36,0.08)"/>
  <text x="200" y="223" fill="white" font-size="12" font-weight="600" text-anchor="middle">Tailscale VPN</text>
  <text x="200" y="241" fill="#94a3b8" font-size="9" text-anchor="middle">Zero-config tunnel</text>
  <text x="200" y="255" fill="#fbbf24" font-size="8" text-anchor="middle">100.100.198.109</text>

  <!-- === Discord Bot (right of Hermes) === -->
  <rect x="525" y="200" width="160" height="65" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="525" y="200" width="160" height="65" rx="6" fill="rgba(167,139,250,0.08)"/>
  <text x="605" y="223" fill="white" font-size="12" font-weight="600" text-anchor="middle">Discord Bot</text>
  <text x="605" y="241" fill="#94a3b8" font-size="9" text-anchor="middle">Messaging bridge</text>
  <text x="605" y="255" fill="#a78bfa" font-size="8" text-anchor="middle">bot_token · DM only</text>

  <!-- === Portfolio Repo (bottom) === -->
  <rect x="250" y="310" width="200" height="50" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="250" y="310" width="200" height="50" rx="6" fill="rgba(8,51,68,0.15)"/>
  <text x="350" y="332" fill="white" font-size="11" font-weight="600" text-anchor="middle">Portfolio Repo</text>
  <text x="350" y="348" fill="#94a3b8" font-size="9" text-anchor="middle">Next.js · TypeScript · pnpm</text>

  <!-- === GitHub (bottom-right) === -->
  <rect x="520" y="310" width="180" height="50" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="520" y="310" width="180" height="50" rx="6" fill="rgba(251,191,36,0.06)"/>
  <text x="610" y="332" fill="white" font-size="11" font-weight="600" text-anchor="middle">GitHub</text>
  <text x="610" y="348" fill="#94a3b8" font-size="9" text-anchor="middle">tripplen23 · PRs · CI</text>

  <!-- === Vercel (far right) === -->
  <rect x="750" y="310" width="180" height="50" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1.5"/>
  <rect x="750" y="310" width="180" height="50" rx="6" fill="rgba(100,116,139,0.06)"/>
  <text x="840" y="332" fill="white" font-size="11" font-weight="600" text-anchor="middle">Vercel</text>
  <text x="840" y="348" fill="#94a3b8" font-size="9" text-anchor="middle">Deploy · Edge · CDN</text>

  <!-- === Phone (far left, outside laptop) === -->
  <rect x="15" y="140" width="70" height="90" rx="8" fill="#0f172a" stroke="#fb7185" stroke-width="1.5"/>
  <rect x="15" y="140" width="70" height="90" rx="8" fill="rgba(251,113,133,0.05)"/>
  <text x="50" y="168" fill="white" font-size="11" font-weight="600" text-anchor="middle">📱 Me</text>
  <text x="50" y="185" fill="#94a3b8" font-size="8" text-anchor="middle">Discord</text>
  <text x="50" y="198" fill="#94a3b8" font-size="8" text-anchor="middle">WhatsApp</text>
  <text x="50" y="215" fill="#fb7185" font-size="7" text-anchor="middle">@Anywhere</text>

  <!-- === ARROWS === -->

  <!-- Hermes ↔ Tailscale -->
  <line x1="280" y1="193" x2="375" y2="150" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="375" y1="165" x2="280" y2="205" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Hermes ↔ Discord -->
  <line x1="625" y1="150" x2="685" y2="197" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="685" y1="210" x2="625" y2="163" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Phone → Tailscale (via internet) -->
  <path d="M 50 230 L 50 270 Q 50 290 70 290 L 118 290" fill="none" stroke="#fb7185" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="55" y="278" fill="#fb7185" font-size="7">via Internet</text>

  <!-- Hermes → Portfolio -->
  <line x1="450" y1="180" x2="380" y2="308" stroke="#22d3ee" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>
  <text x="395" y="225" fill="#22d3ee" font-size="7">git clone</text>

  <!-- Portfolio → GitHub -->
  <line x1="450" y1="335" x2="518" y2="335" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="484" y="328" fill="#94a3b8" font-size="7">Push PR</text>

  <!-- GitHub → Vercel -->
  <line x1="700" y1="335" x2="748" y2="335" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="724" y="328" fill="#94a3b8" font-size="7">Deploy</text>

  <!-- Hermes → Vercel (build check) -->
  <path d="M 625 160 L 625 120 Q 625 80 700 80 L 780 80 Q 810 80 810 100 L 810 308" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="695" y="72" fill="#64748b" font-size="7">Build status check</text>

  <!-- LEGEND -->
  <g transform="translate(45, 370)">
    <text x="0" y="0" fill="#64748b" font-size="8">Legend:</text>
    <rect x="55" y="-6" width="10" height="7" rx="1" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="0.7"/>
    <text x="70" y="0" fill="#94a3b8" font-size="7">Agent</text>
    <rect x="105" y="-6" width="10" height="7" rx="1" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="0.7"/>
    <text x="120" y="0" fill="#94a3b8" font-size="7">Infra</text>
    <rect x="148" y="-6" width="10" height="7" rx="1" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="0.7"/>
    <text x="163" y="0" fill="#94a3b8" font-size="7">Messaging</text>
    <rect x="218" y="-6" width="10" height="7" rx="1" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="0.7"/>
    <text x="233" y="0" fill="#94a3b8" font-size="7">Code</text>
    <rect x="265" y="-6" width="10" height="7" rx="1" fill="rgba(251,113,133,0.15)" stroke="#fb7185" stroke-width="0.7"/>
    <text x="280" y="0" fill="#94a3b8" font-size="7">User</text>
  </g>
</svg>
